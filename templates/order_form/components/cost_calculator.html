<!-- Cost Calculator Modal -->
<div id="cost-calculator-modal" class="fixed inset-0 bg-black bg-opacity-50 z-50 hidden flex items-center justify-center p-4">
    <div class="bg-white rounded-xl shadow-xl max-w-lg w-full">
        <!-- Header -->
        <div class="flex justify-between items-center p-4 border-b border-gray-200">
            <h3 class="text-lg font-bold text-gray-900 flex items-center">
                <i class="fas fa-calculator text-orange-500 mr-2"></i>
                Cost Calculator
            </h3>
            <button onclick="closeCostCalculator()" class="text-gray-400 hover:text-gray-600">
                <i class="fas fa-times"></i>
            </button>
        </div>
        
        <!-- Content -->
        <div class="p-4 space-y-3">
            <!-- Cost Items -->
            <div class="flex justify-between items-center py-2 border-b border-gray-100">
                <span class="text-sm text-gray-600">Team Cost</span>
                <div class="flex items-center gap-2">
                    <span id="team-display" class="font-semibold">₹0</span>
                    <input type="text" id="team-input" value="0" class="hidden w-16 px-2 py-1 text-right border border-gray-300 rounded text-sm">
                    <i class="fas fa-edit text-gray-400 hover:text-blue-500 cursor-pointer text-xs" onclick="editField('team')"></i>
                </div>
            </div>
            <div class="flex justify-between items-center py-2 border-b border-gray-100">
                <span class="text-sm text-gray-600">Standard Deliverables</span>
                <div class="flex items-center gap-2">
                    <span id="standard-display" class="font-semibold">₹0</span>
                    <input type="text" id="standard-input" value="0" class="hidden w-16 px-2 py-1 text-right border border-gray-300 rounded text-sm">
                    <i class="fas fa-edit text-gray-400 hover:text-blue-500 cursor-pointer text-xs" onclick="editField('standard')"></i>
                </div>
            </div>
            <div class="flex justify-between items-center py-2 border-b border-gray-100">
                <span class="text-sm text-gray-600">Add-ons</span>
                <div class="flex items-center gap-2">
                    <span id="addons-display" class="font-semibold">₹0</span>
                    <input type="text" id="addons-input" value="0" class="hidden w-16 px-2 py-1 text-right border border-gray-300 rounded text-sm">
                    <i class="fas fa-edit text-gray-400 hover:text-blue-500 cursor-pointer text-xs" onclick="editField('addons')"></i>
                </div>
            </div>
            <div class="flex justify-between items-center py-2 border-b border-gray-100">
                <span class="text-sm text-gray-600">Travel & Accommodation</span>
                <div class="flex items-center gap-2">
                    <span id="travel-display" class="font-semibold">₹0</span>
                    <input type="text" id="travel-input" value="0" class="hidden w-16 px-2 py-1 text-right border border-gray-300 rounded text-sm">
                    <i class="fas fa-edit text-gray-400 hover:text-blue-500 cursor-pointer text-xs" onclick="editField('travel')"></i>
                </div>
            </div>
            <div class="flex justify-between items-center py-2 border-b border-gray-100">
                <span class="text-sm text-gray-600">Gear & Drone Rental</span>
                <div class="flex items-center gap-2">
                    <span id="rental-display" class="font-semibold">₹0</span>
                    <input type="text" id="rental-input" value="0" class="hidden w-16 px-2 py-1 text-right border border-gray-300 rounded text-sm">
                    <i class="fas fa-edit text-gray-400 hover:text-blue-500 cursor-pointer text-xs" onclick="editField('rental')"></i>
                </div>
            </div>
            <div class="flex justify-between items-center py-2 border-b border-gray-100">
                <span class="text-sm text-gray-600">Internal Transportation</span>
                <div class="flex items-center gap-2">
                    <span id="transport-display" class="font-semibold">₹0</span>
                    <input type="text" id="transport-input" value="0" class="hidden w-16 px-2 py-1 text-right border border-gray-300 rounded text-sm">
                    <i class="fas fa-edit text-gray-400 hover:text-blue-500 cursor-pointer text-xs" onclick="editField('transport')"></i>
                </div>
            </div>
            
            <!-- Subtotal -->
            <div class="flex justify-between py-2 border-b border-gray-200">
                <span class="font-medium text-gray-700">Subtotal</span>
                <span id="subtotal" class="font-bold">₹0</span>
            </div>
            
            <!-- Operation Cost -->
            <div class="flex justify-between items-center py-2 border-b border-gray-100">
                <span class="text-sm text-gray-600">Operation Cost</span>
                <div class="flex items-center gap-2">
                    <span id="operation-display" class="font-semibold">₹0</span>
                    <input type="text" id="operation-input" value="0" class="hidden w-16 px-2 py-1 text-right border border-gray-300 rounded text-sm">
                    <i class="fas fa-edit text-gray-400 hover:text-blue-500 cursor-pointer text-xs" onclick="editField('operation')"></i>
                </div>
            </div>
            
            <!-- Profit -->
            <div class="flex justify-between items-center py-2 border-b border-gray-200">
                <div class="flex items-center gap-2">
                    <span class="text-sm text-gray-600">Profit</span>
                    <span id="profit-percentage-display" class="text-xs text-gray-500">(0%)</span>
                    <input type="text" id="profit-percentage" value="0" class="hidden w-8 px-1 py-1 text-center border border-gray-300 rounded text-xs">
                    <i class="fas fa-edit text-gray-400 hover:text-blue-500 cursor-pointer text-xs" onclick="editField('profit-percentage')"></i>
                </div>
                <span id="profit-amount" class="font-semibold">₹0</span>
            </div>
            
            <!-- Final Total -->
            <div class="bg-green-50 border border-green-200 rounded-lg p-3 mt-4">
                <div class="flex justify-between items-center">
                    <span class="font-bold text-green-800">Final Quote</span>
                    <span id="final-total" class="text-xl font-bold text-green-800">₹0</span>
                </div>
            </div>
        </div>
        
        <!-- Actions -->
        <div class="p-4 border-t border-gray-200 flex gap-2">
            <button onclick="closeCostCalculator()" class="flex-1 px-4 py-2 border border-gray-300 text-gray-700 rounded-lg hover:bg-gray-50">
                Close
            </button>
            <button onclick="applyCostToDeal()" class="flex-1 px-4 py-2 bg-orange-600 text-white rounded-lg hover:bg-orange-700">
                Apply to Deal
            </button>
        </div>
    </div>
</div>
