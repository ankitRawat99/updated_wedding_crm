<!-- Cost Factors Section -->
<div class="bg-gradient-to-r from-orange-50 to-amber-50 border-2 border-orange-200 rounded-custom p-6 mb-8">
    <div class="flex items-center mb-6">
        <div class="w-12 h-12 bg-gradient-to-r from-orange-500 to-amber-500 rounded-full flex items-center justify-center mr-4">
            <i class="fas fa-calculator text-white text-xl"></i>
        </div>
        <div>
            <h4 class="text-xl font-bold text-orange-800">Additional Cost Factors</h4>
            <p class="text-sm text-orange-600">Travel, accommodation & equipment costs</p>
        </div>
    </div>
    
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <!-- Travel -->
        <div class="bg-white p-4 rounded-xl border border-orange-200">
            <h5 class="font-semibold text-gray-800 mb-3 flex items-center">
                <i class="fas fa-plane text-orange-500 mr-2"></i>
                Travel
            </h5>
            <div class="space-y-3">
                <div>
                    <label class="flex items-center cursor-pointer">
                        <input type="radio" name="travel_cost" value="tsv" class="mr-2">
                        <span class="text-sm">On TSV</span>
                    </label>
                </div>
                <div>
                    <label class="flex items-center cursor-pointer">
                        <input type="radio" name="travel_cost" value="client" class="mr-2">
                        <span class="text-sm">On Client</span>
                    </label>
                </div>
            </div>
        </div>
        
        <!-- Accommodation -->
        <div class="bg-white p-4 rounded-xl border border-orange-200">
            <h5 class="font-semibold text-gray-800 mb-3 flex items-center">
                <i class="fas fa-bed text-orange-500 mr-2"></i>
                Accommodation
            </h5>
            <div class="space-y-3">
                <div>
                    <label class="flex items-center cursor-pointer">
                        <input type="radio" name="accommodation_cost" value="tsv" class="mr-2">
                        <span class="text-sm">On TSV</span>
                    </label>
                </div>
                <div>
                    <label class="flex items-center cursor-pointer">
                        <input type="radio" name="accommodation_cost" value="client" class="mr-2">
                        <span class="text-sm">On Client</span>
                    </label>
                </div>
            </div>
        </div>
        
        <!-- Gear Rental -->
        <div class="bg-white p-4 rounded-xl border border-orange-200">
            <h5 class="font-semibold text-gray-800 mb-3 flex items-center">
                <i class="fas fa-camera text-orange-500 mr-2"></i>
                Gear Rental
            </h5>
            <div class="space-y-3">
                <div>
                    <label class="flex items-center cursor-pointer">
                        <input type="radio" name="gear_rental" value="yes" class="mr-2">
                        <span class="text-sm">Yes</span>
                    </label>
                </div>
                <div>
                    <label class="flex items-center cursor-pointer">
                        <input type="radio" name="gear_rental" value="no" class="mr-2">
                        <span class="text-sm">No</span>
                    </label>
                </div>
            </div>
        </div>
        
        <!-- Drone Rental -->
        <div class="bg-white p-4 rounded-xl border border-orange-200">
            <h5 class="font-semibold text-gray-800 mb-3 flex items-center">
                <i class="fas fa-helicopter text-orange-500 mr-2"></i>
                Drone Rental
            </h5>
            <div class="space-y-3">
                <div>
                    <label class="flex items-center cursor-pointer">
                        <input type="radio" name="drone_rental" value="yes" class="mr-2">
                        <span class="text-sm">Yes</span>
                    </label>
                </div>
                <div>
                    <label class="flex items-center cursor-pointer">
                        <input type="radio" name="drone_rental" value="no" class="mr-2">
                        <span class="text-sm">No</span>
                    </label>
                </div>
            </div>
        </div>
    </div>
</div>
