<!-- Client Details Section -->
<div class="bg-gradient-to-r from-blue-50 to-indigo-50 border-2 border-blue-200 rounded-custom p-6 mb-8">
    <div class="flex items-center mb-6">
        <div class="w-12 h-12 bg-gradient-to-r from-blue-500 to-indigo-500 rounded-full flex items-center justify-center mr-4">
            <i class="fas fa-users text-white text-xl"></i>
        </div>
        <div>
            <h4 class="text-xl font-bold text-blue-800">Cliento Detailssss</h4>
            <p class="text-sm text-blue-600">Bride and groom information</p>
        </div>
    </div>
    
    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
        <!-- Bride Section -->
        <div class="bg-white p-6 rounded-xl border-2 border-pink-200">
            <h5 class="text-md font-semibold text-pink-800 mb-4 flex items-center">
                <i class="fas fa-female mr-2"></i>Bride Details
            </h5>
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">
                        Name <span class="text-red-500">*</span>
                    </label>
                    <input type="text" name="bride_name" required
                           class="w-full px-4 py-3 border border-gray-300 rounded-custom focus:ring-2 focus:ring-pink-500 focus:border-transparent">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">
                        Aadhar No <span class="text-red-500">*</span>
                    </label>
                    <input type="text" name="bride_aadhar" required
                           placeholder="1234 5678 9012"
                           maxlength="14"
                           class="w-full px-4 py-3 border border-gray-300 rounded-custom focus:ring-2 focus:ring-pink-500 focus:border-transparent">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">
                        Email
                    </label>
                    <input type="email" name="bride_email"
                           placeholder="bride@example.com"
                           class="w-full px-4 py-3 border border-gray-300 rounded-custom focus:ring-2 focus:ring-pink-500 focus:border-transparent">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">
                        Contact <span class="text-red-500">*</span>
                    </label>
                    <input type="tel" name="bride_contact" required
                           placeholder="+91 98765 43210"
                           class="w-full px-4 py-3 border border-gray-300 rounded-custom focus:ring-2 focus:ring-pink-500 focus:border-transparent">
                </div>
            </div>
        </div>
        
        <!-- Groom Section -->
        <div class="bg-white p-6 rounded-xl border-2 border-blue-200">
            <h5 class="text-md font-semibold text-blue-800 mb-4 flex items-center">
                <i class="fas fa-male mr-2"></i>Groom Details
            </h5>
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">
                        Name <span class="text-red-500">*</span>
                    </label>
                    <input type="text" name="groom_name" required
                           class="w-full px-4 py-3 border border-gray-300 rounded-custom focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">
                        Aadhar No <span class="text-red-500">*</span>
                    </label>
                    <input type="text" name="groom_aadhar" required
                           placeholder="1234 5678 9012"
                           maxlength="14"
                           class="w-full px-4 py-3 border border-gray-300 rounded-custom focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">
                        Email
                    </label>
                    <input type="email" name="groom_email"
                           placeholder="groom@example.com"
                           class="w-full px-4 py-3 border border-gray-300 rounded-custom focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">
                        Contact <span class="text-red-500">*</span>
                    </label>
                    <input type="tel" name="groom_contact" required
                           placeholder="+91 98765 43210"
                           class="w-full px-4 py-3 border border-gray-300 rounded-custom focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                </div>
            </div>
        </div>
    </div>
</div>
