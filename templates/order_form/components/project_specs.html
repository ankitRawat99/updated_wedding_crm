<!-- Project Specifications Section -->
<div class="bg-gradient-to-r from-purple-50 to-pink-50 border-2 border-purple-200 rounded-custom p-6 mb-8">
    <div class="flex items-center mb-6">
        <div class="w-12 h-12 bg-gradient-to-r from-purple-500 to-pink-500 rounded-full flex items-center justify-center mr-4">
            <i class="fas fa-palette text-white text-xl"></i>
        </div>
        <div>
            <h4 class="text-xl font-bold text-purple-800">Project Specifications</h4>
            <p class="text-sm text-purple-600">Style preferences and requirements</p>
        </div>
    </div>
    
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <!-- Inspiration/Specification -->
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">Inspiration/Specification</label>
            <textarea name="inspiration_specification" rows="3" placeholder="Describe the style, mood, or specific requirements..." class="w-full px-4 py-3 border border-gray-300 rounded-custom focus:ring-2 focus:ring-purple-500 focus:border-transparent"></textarea>
        </div>
        
        <!-- Culture Specific -->
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">Culture Specific</label>
            <textarea name="culture_specific" rows="3" placeholder="Cultural traditions, customs, or specific requirements..." class="w-full px-4 py-3 border border-gray-300 rounded-custom focus:ring-2 focus:ring-purple-500 focus:border-transparent"></textarea>
        </div>
        
        <!-- Category -->
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">Category</label>
            <select name="category" class="w-full px-4 py-3 border border-gray-300 rounded-custom focus:ring-2 focus:ring-purple-500 focus:border-transparent">
                <option value="">Select Category</option>
                <option value="Premium">Premium</option>
                <option value="Mid">Mid</option>
                <option value="Low">Low</option>
            </select>
        </div>
        
        <!-- Makeup Venue -->
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">Makeup Venue</label>
            <input type="text" name="makeup_venue" placeholder="Venue for makeup session..." class="w-full px-4 py-3 border border-gray-300 rounded-custom focus:ring-2 focus:ring-purple-500 focus:border-transparent">
        </div>
        
        <!-- Coverage Type -->
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">
                Coverage Type <span class="text-red-500">*</span>
            </label>
            <select name="coverage_type" required class="w-full px-4 py-3 border border-gray-300 rounded-custom focus:ring-2 focus:ring-purple-500 focus:border-transparent">
                <option value="">Select Coverage</option>
                <option value="Bride">Single(Bride)</option>
                <option value="Groom">Single(Groom)</option>
                <option value="Bride and Groom">Both</option>
            </select>
        </div>
    </div>
</div>
