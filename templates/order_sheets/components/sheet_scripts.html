//     loadOrderData();

// Make functions globally available
window.loadOrderData = loadOrderData;
window.updateOrderSheet = updateOrderSheet;
window.showError = showError;

// Load order data from localStorage
function loadOrderData() {
    try {
        // First check if we have currentOrderSheet (from generate order)
        const currentOrderSheet = localStorage.getItem('currentOrderSheet');
        if (currentOrderSheet) {
            console.log('🎯 Loading from currentOrderSheet');
            currentOrderData = JSON.parse(currentOrderSheet);
            updateCurrentSheet();
            // Clear the currentOrderSheet after loading
            localStorage.removeItem('currentOrderSheet');
            return;
        }
        
        const pathParts = window.location.pathname.split('/');
        const orderId = pathParts[pathParts.length - 1];
        
        if (!orderId || orderId === 'order-sheet') {
            showError('No order ID found in URL');
            return;
        }
        
        // Search in multiple localStorage keys for order data - prioritize full order data
        const storageKeys = ['weddingcrm_orders', 'weddingcrm_order_sheets', 'weddingcrm_booking_orders'];
        
        console.log('🔍 Searching for order:', orderId, 'in storage keys:', storageKeys);
        
        let foundOrders = [];
        
        // Collect all matching orders from different sources
        for (const key of storageKeys) {
            const dataRaw = localStorage.getItem(key);
            console.log(`📦 Checking ${key}:`, dataRaw ? 'has data' : 'empty');
            if (dataRaw) {
                try {
                    const orders = JSON.parse(dataRaw);
                    console.log(`📋 ${key} contains ${orders.length} orders`);
                    const order = orders.find(o => o.id === orderId || o._id === orderId);
                    
                    if (order) {
                        foundOrders.push({ source: key, data: order });
                        console.log(`✅ Found order ${orderId} in ${key}:`, {
                            hasClientDetails: !!order.client_details,
                            hasProjectSpecs: !!order.project_specs,
                            hasEvents: !!order.events,
                            dataKeys: Object.keys(order).slice(0, 10)
                        });
                    }
                } catch (parseError) {
                    console.error(`❌ Error parsing ${key}:`, parseError);
                }
            }
        }
        
        if (foundOrders.length > 0) {
            // PRIORITY 1: weddingcrm_orders key (full form data)
            let selectedOrder = foundOrders.find(o => o.source === 'weddingcrm_orders');
            
            // PRIORITY 2: Full order data with client_details (from order forms)
            if (!selectedOrder) {
                selectedOrder = foundOrders.find(o => o.data.client_details && Object.keys(o.data.client_details).length > 0);
            }
            
            // PRIORITY 3: Order with comprehensive data structure (project_specs, payment_schedule, etc.)
            if (!selectedOrder) {
                selectedOrder = foundOrders.find(o => o.data.project_specs || o.data.payment_schedule || o.data.deliverables);
            }
            
            // PRIORITY 4: Any other order data
            if (!selectedOrder) {
                selectedOrder = foundOrders[0];
            }
            
            console.log(`🎯 SELECTED order from ${selectedOrder.source}:`, selectedOrder.data);
            console.log('📊 All found orders comparison:');
            foundOrders.forEach((order, index) => {
                console.log(`  ${index + 1}. ${order.source}:`, {
                    hasClientDetails: !!order.data.client_details,
                    hasProjectSpecs: !!order.data.project_specs,
                    hasPaymentSchedule: !!order.data.payment_schedule,
                    dataSize: Object.keys(order.data).length,
                    keys: Object.keys(order.data).slice(0, 10)
                });
            });
            console.log('🔍 Selected order structure check:', {
                hasClientDetails: !!selectedOrder.data.client_details,
                hasProjectSpecs: !!selectedOrder.data.project_specs,
                hasEvents: !!selectedOrder.data.events,
                hasPaymentSchedule: !!selectedOrder.data.payment_schedule,
                brideNamePath1: selectedOrder.data.client_details?.bride?.name,
                groomNamePath1: selectedOrder.data.client_details?.groom?.name,
                dealAmountPath1: selectedOrder.data.payment_schedule?.deal_amount,
                // Check booking card format
                coupleName: selectedOrder.data.couple_name,
                dealAmount: selectedOrder.data.deal_amount,
                allKeys: Object.keys(selectedOrder.data)
            });
            
            currentOrderData = selectedOrder.data;
            updateCurrentSheet();
            return;
        }
        
        showError(`Order ${orderId} not found`);
        
    } catch (error) {
        console.error('Error loading order data:', error);
        showError('Error loading order data');
    }
}

// Load specific sheet
function loadSheet(sheetType) {
    if (sheetType === currentSheet) return;
    
    // Show loading
    document.getElementById('sheet-content').innerHTML = '<div class="text-center py-8"><div class="loading-spinner"></div><p class="mt-2">Loading sheet...</p></div>';
    
    // Update tab states
    updateTabStates(sheetType);
    
    // Load sheet content directly (client-side)
    setTimeout(() => {
        loadStaticSheet(sheetType);
    }, 500);
}

// Global function for navigation compatibility
window.loadSheet = loadSheet;

// Load static sheet content
function loadStaticSheet(sheetType) {
    const sheetTemplates = {
        'order': getOrderSheetHTML(),
        'cost': getCostSheetHTML(),
        'team': getTeamSheetHTML(),
        'production': getProductionSheetHTML()
    };
    
    document.getElementById('sheet-content').innerHTML = sheetTemplates[sheetType] || sheetTemplates['order'];
    currentSheet = sheetType;
    updateCurrentSheet();
}

// Update tab states
function updateTabStates(activeSheet) {
    document.querySelectorAll('.sheet-tab').forEach(tab => {
        tab.classList.remove('active', 'border-blue-500', 'text-blue-600');
        tab.classList.add('border-transparent', 'text-gray-500');
    });
    
    const activeTab = document.getElementById(`${activeSheet}-sheet-tab`);
    if (activeTab) {
        activeTab.classList.add('active', 'border-blue-500', 'text-blue-600');
        activeTab.classList.remove('border-transparent', 'text-gray-500');
    }
}

// Update current sheet with data
function updateCurrentSheet() {
    if (!currentOrderData) return;
    
    switch(currentSheet) {
        case 'order':
            updateOrderSheet(currentOrderData);
            break;
        case 'cost':
            updateCostSheet(currentOrderData);
            break;
        case 'team':
            updateTeamSheet(currentOrderData);
            break;
        case 'production':
            updateProductionSheet(currentOrderData);
            break;
    }
    
    // Update all headers
    updateAllHeaders();
}

// Update order sheet
function updateOrderSheet(order) {
    console.log('📋 Updating order sheet with data:', order);
    console.log('📊 Order structure analysis:', {
        hasClientDetails: !!order.client_details,
        hasProjectSpecs: !!order.project_specs,
        hasPaymentSchedule: !!order.payment_schedule,
        hasEvents: !!order.events,
        hasCoupleNameField: !!order.couple_name,
        topLevelKeys: Object.keys(order).slice(0, 15)
    });
    
    // Extract client data from multiple possible sources
    let clientData = {};
    
    if (order.client_details) {
        // Data from order forms (new order system)
        console.log('🎯 Using client_details structure');
        clientData = {
            bride_name: order.client_details.bride?.name || '',
            bride_contact: order.client_details.bride?.contact || '',
            bride_email: order.client_details.bride?.email || '',
            bride_aadhar: order.client_details.bride?.aadhar || '',
            groom_name: order.client_details.groom?.name || '',
            groom_contact: order.client_details.groom?.contact || '',
            groom_email: order.client_details.groom?.email || '',
            groom_aadhar: order.client_details.groom?.aadhar || '',
            coverage_type: order.project_specs?.coverage_type || '',
            category: order.project_specs?.category || '',
            prewedding: order.pre_wedding?.enabled ? 'Yes' : 'No',
            deal_amount: order.payment_schedule?.deal_amount || '',
            advance_amount: order.payment_schedule?.advance_payments?.[0]?.amount || ''
        };
    } else if (order.couple_name) {
        // Data from booking orders (existing system)
        console.log('🎯 Using couple_name structure');
        const names = order.couple_name.split(' & ');
        clientData = {
            bride_name: names[0]?.trim() || '',
            groom_name: names[1]?.trim() || '',

            groom_contact: order.contact_number || '',
            bride_email: order.bride_email || '',
            groom_email: order.groom_email || '',

            category: order.category || '',
            prewedding: order.pw_type ? 'Yes' : 'No',
            deal_amount: order.deal_amount || '',
            advance_amount: order.advance_paid || ''
        };
    } else {
        // Fallback: try to extract from any available fields
        console.log('🎯 Using fallback extraction');
        let brideName = '', groomName = '';
        if (order.couple_name) {
            const names = order.couple_name.split(' & ');
            brideName = names[0]?.trim() || '';
            groomName = names[1]?.trim() || '';
        }
        
        clientData = {
            bride_name: brideName || order.bride_name || order.client_name || '',
            bride_contact: order.bride_contact || order.contact_number || order.contact || '',
            bride_email: order.bride_email || order.email || '',
            bride_aadhar: order.bride_aadhar || '',
            groom_name: groomName || order.groom_name || '',
            groom_contact: order.groom_contact || order.contact_number || order.contact || '',
            groom_email: order.groom_email || '',
            groom_aadhar: order.groom_aadhar || '',
            coverage_type: order.coverage_type || '',
            category: order.category || '',
            prewedding: order.pw_type ? 'Yes' : (order.prewedding || order.pre_wedding || 'No'),
            deal_amount: order.deal_amount || order.total_amount || '',
            advance_amount: order.advance_paid || order.advance_amount || order.advance || ''
        };
    }
    
    console.log('✅ Extracted client data:', clientData);
    
    // Update client fields with better fallback handling
    updateField('bride-name', clientData.bride_name || 'Not specified');
    updateField('groom-name', clientData.groom_name || 'Not specified');
    updateField('bride-contact', clientData.bride_contact || 'Not specified');
    updateField('groom-contact', clientData.groom_contact || 'Not specified');
    updateField('bride-email', clientData.bride_email || 'Not specified');
    updateField('groom-email', clientData.groom_email || 'Not specified');
    updateField('bride-aadhar', clientData.bride_aadhar || 'Not specified');
    updateField('groom-aadhar', clientData.groom_aadhar || 'Not specified');
    
    // Update coverage details
    updateField('coverage-type', clientData.coverage_type || 'Not specified');
    updateField('coverage-category', clientData.category || 'Not specified');
    updateField('coverage-prewedding', clientData.prewedding || 'Not specified');
    
    // PROJECT SPECIFICATIONS MAPPING
    if (order.project_specs) {
        updateField('specs-inspiration', order.project_specs.inspiration_specification || '');
        updateField('specs-culture', order.project_specs.culture_specific || '');
        updateField('specs-makeup', order.project_specs.makeup_venue || '');
    }
    
    // COST FACTORS MAPPING
    if (order.cost_factors) {
        updateField('factors-travel', order.cost_factors.travel_cost || '');
        updateField('factors-accommodation', order.cost_factors.accommodation_cost || '');
        updateField('factors-gear', order.cost_factors.gear_rental || '');
        updateField('factors-drone', order.cost_factors.drone_rental || '');
    }
    
    // PRE-WEDDING MAPPING
    if (order.pre_wedding && order.pre_wedding.enabled) {
        document.getElementById('prewedding-section').style.display = 'block';
        document.getElementById('prewedding-content').style.display = 'grid';
        updateField('prewedding-type', order.pre_wedding.type || '');
        updateField('prewedding-location', order.pre_wedding.location || '');
        updateField('prewedding-date', order.pre_wedding.start_date || '');
    }
    
    // Update advance info
    const advanceText = clientData.advance_amount ? `₹${clientData.advance_amount}` : '';
    const dateText = clientData.advance_date ? ` - ${clientData.advance_date}` : '';
    updateField('advance-info', advanceText + dateText || 'No advance information');
    
    // Update deal amount
    updateField('deal-total', clientData.deal_amount ? `₹${clientData.deal_amount}` : '');
    
    // ENHANCED NOTES MAPPING
    let allNotes = [];
    if (order.notes) {
        if (order.notes.personal) allNotes.push(...order.notes.personal.map(n => n.content));
        if (order.notes.event) allNotes.push(...order.notes.event.map(n => n.content));
        if (order.notes.package) allNotes.push(...order.notes.package.map(n => n.content));
    }
    const notes = allNotes.join('; ') || order.special_notes || order.client_notes || 
                 order.project_specs?.inspiration_specification || order.requirements || 
                 order.description || 'No special notes provided.';
    updateField('client-notes', notes);
    
    // Update other sections with debugging
    console.log('📅 Updating events section...');
    updateEventsSection(order);
    console.log('📦 Updating deliverables section...');
    updateDeliverables(order);
    console.log('⚙️ Updating operation details...');
    updateOperationDetails(order);
    console.log('💰 Updating payment schedule...');
    updatePaymentSchedule(order);
    console.log('✅ All sections updated successfully');
}

// Helper functions
function updateAllHeaders() {
    const orderId = currentOrderData?.id || 'Loading...';
    const currentDate = getCurrentDate();
    
    const headerIds = [
        'headerOrderId', 'orderIdDisplay', 'costOrderIdDisplay', 
        'teamOrderIdDisplay', 'productionOrderIdDisplay'
    ];
    
    const dateIds = [
        'orderDateDisplay', 'costOrderDateDisplay', 'teamOrderDateDisplay', 
        'productionOrderDateDisplay', 'generatedDateDisplay', 'costGeneratedDateDisplay',
        'teamGeneratedDateDisplay', 'productionGeneratedDateDisplay'
    ];
    
    headerIds.forEach(id => updateField(id, orderId));
    dateIds.forEach(id => updateField(id, currentDate));
}

function updateField(fieldId, value) {
    const element = document.getElementById(fieldId);
    if (element) {
        const cleanValue = value ? String(value).trim() : '';
        const displayValue = cleanValue || 'Not specified';
        
        console.log(`📝 Updating field ${fieldId}:`, {
            originalValue: value,
            cleanValue: cleanValue,
            displayValue: displayValue,
            elementFound: true
        });
        
        if (element.tagName === 'INPUT') {
            element.value = cleanValue;
        } else {
            element.innerHTML = displayValue;
        }
        
        if (!cleanValue || cleanValue === 'Not specified') {
            element.style.color = '#9CA3AF';
            element.style.fontStyle = 'italic';
        } else {
            element.style.color = '';
            element.style.fontStyle = '';
        }
    } else {
        console.warn(`❌ Element with ID '${fieldId}' not found`);
    }
}

function getCurrentDate() {
    return new Date().toLocaleDateString('en-GB', {

function deleteOrderPermanently(orderId) {
    window.alertSystem.showProgress('Deleting Order', 'Removing order from all systems...');
    
    try {
        // Delete from all localStorage sources
        const storageKeys = ['weddingcrm_booking_orders', 'weddingcrm_order_sheets', 'weddingcrm_orders'];
        
        storageKeys.forEach(key => {
            const data = JSON.parse(localStorage.getItem(key) || '[]');
            const updatedData = data.filter(order => order.id !== orderId);
            localStorage.setItem(key, JSON.stringify(updatedData));
        });
        
        setTimeout(() => {
            window.alertSystem.hideProgress();
            window.alertSystem.show(
                `Order ${orderId} has been permanently deleted.`,
                'success',
                'Order Deleted Successfully',
                {
                    callback: () => {
                        window.location.href = '/order-bookings';
                    },
                    confirmText: 'Back to Bookings'
                }
            );
        }, 2000);
        
    } catch (error) {
        window.alertSystem.hideProgress();
        window.alertSystem.show('Failed to delete order. Please try again.', 'error', 'Deletion Failed');
    }
}

        if (order.deliverables.standard && standardContainer) {

                standardHTML += `<div>${symbol} ${item.name}</div>`;

            standardContainer.innerHTML = standardHTML || '<p class="text-gray-500">No standard deliverables</p>';
            console.log('✅ Standard deliverables updated:', order.deliverables.standard.length, 'items');
        }
        
        // Addon deliverables
        if (order.deliverables.addons && addonContainer) {
            let addonHTML = '';
            order.deliverables.addons.forEach(item => {
                const symbol = item.checked ? '☑' : '☐';
                addonHTML += `<div>${symbol} ${item.name}</div>`;
            });
            addonContainer.innerHTML = addonHTML || '<p class="text-gray-500">No add-ons selected</p>';
            console.log('✅ Addon deliverables updated:', order.deliverables.addons.length, 'items');

                const symbol = item.checked ? '☑' : '☐';

function updatePaymentSchedule(order) {

    if (!tbody) {
        console.warn('❌ Payment schedule table not found');
        return;
    }
    
    console.log('💰 Payment schedule data:', order.payment_schedule);
    
    if (order.payment_schedule) {
        let rows = '';
        const total = parseInt(order.payment_schedule.deal_amount) || 0;
        console.log('💵 Total deal amount:', total);
        
        // Add advance payments
        if (order.payment_schedule.advance_payments && order.payment_schedule.advance_payments.length > 0) {
            order.payment_schedule.advance_payments.forEach((payment, index) => {
                const amount = parseInt(payment.amount) || 0;
                const percent = total > 0 ? Math.round((amount / total) * 100) : parseInt(payment.percentage) || 0;
                rows += `
                    <tr class="border-b border-gray-200">
                        <td class="py-2">Advance ${index + 1}</td>

                    </tr>
                `;
            });
            console.log('✅ Added', order.payment_schedule.advance_payments.length, 'advance payments');
        }
        
        // Add event payments
        if (order.payment_schedule.event_payments && order.payment_schedule.event_payments.length > 0) {
            order.payment_schedule.event_payments.forEach((payment, index) => {
                const amount = parseInt(payment.amount) || 0;

                        <td class="text-center py-2">₹${amount.toLocaleString()}</td>

        // Add delivery payments

        }
        
        tbody.innerHTML = rows || '<tr><td colspan="4" class="text-center py-4 text-gray-500">No payment schedule configured</td></tr>';

    } else {
        tbody.innerHTML = '<tr><td colspan="4" class="text-center py-4 text-gray-500">No payment schedule configured</td></tr>';
        console.log('⚠️ No payment schedule found, showing placeholder');
