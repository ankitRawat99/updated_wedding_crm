<!-- Completion Checkbox Component -->
<div class="completion-checkbox w-4 h-4 rounded-full border-2 border-gray-300 bg-white flex items-center justify-center cursor-pointer hover:border-green-400 transition-all duration-200" onclick="toggleCompletion(event, '{{ tab_name }}')" title="Mark section as complete">
    <i class="fas fa-check text-white text-xs hidden"></i>
</div>
