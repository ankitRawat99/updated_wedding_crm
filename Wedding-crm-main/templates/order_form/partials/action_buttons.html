<!-- Top Action Buttons -->
<div class="sticky top-0 bg-white z-30 flex justify-between items-center mb-6 py-4 border-b border-gray-200 shadow-sm">
    <a href="/order" class="inline-flex items-center px-4 py-2 text-gray-600 hover:text-gray-900 hover:bg-gray-50 rounded-lg transition-all duration-200 border border-gray-300">
        <i class="fas fa-arrow-left mr-2"></i>
        Back to Orders
    </a>
    <div class="flex items-center space-x-3">
        <button id="save-btn" onclick="saveDraft()" class="px-4 py-2 bg-gradient-to-r from-blue-500 to-blue-600 text-white rounded-lg font-medium hover:from-blue-600 hover:to-blue-700 transition-all transform hover:scale-105 shadow-md">
            <i class="fas fa-save mr-2"></i>Save
        </button>

        <button id="quotation-btn" class="px-4 py-2 bg-gray-400 text-gray-600 rounded-lg font-medium cursor-not-allowed shadow-md" disabled>
            <i class="fas fa-chart-line mr-2"></i>Raise Quotation
        </button>
        <button id="calculator-btn" class="px-4 py-2 bg-gray-400 text-gray-600 rounded-lg font-medium cursor-not-allowed shadow-md" disabled onclick="openCostCalculator()">
            <i class="fas fa-calculator mr-2"></i>Cost Calculator
        </button>
        <button id="generate-btn" class="px-4 py-2 bg-gray-400 text-gray-600 rounded-lg font-medium cursor-not-allowed shadow-md" disabled onclick="generateOrder()">
            <i class="fas fa-file-invoice mr-2"></i>Generate Order
        </button>
    </div>
</div>
