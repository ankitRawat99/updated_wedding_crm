<!-- Notes Section -->
<div class="border border-gray-200 rounded-lg p-4 mb-8">
    <div class="flex items-center justify-between mb-4">
        <h4 class="text-lg font-medium text-gray-900 flex items-center">
            <i class="fas fa-sticky-note text-gray-500 mr-2"></i>Notes
        </h4>
        <button type="button" onclick="showNoteInput('{{ section_name }}')" class="px-3 py-1.5 bg-blue-600 text-white rounded-md hover:bg-blue-700 transition-colors text-sm">
            <i class="fas fa-plus mr-1"></i>Add Note
        </button>
    </div>
    <div id="{{ section_name }}-note-input" class="hidden mb-4 p-4 bg-blue-50 border border-blue-200 rounded-lg">
        <textarea id="{{ section_name }}-note-text" placeholder="Enter your note..." rows="3" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:border-blue-500 text-sm resize-none"></textarea>
        <div class="flex gap-2 mt-3">
            <button type="button" onclick="saveNote('{{ section_name }}')" class="px-4 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700 text-sm">
                <i class="fas fa-check mr-1"></i>Save
            </button>
            <button type="button" onclick="cancelNote('{{ section_name }}')" class="px-4 py-2 bg-gray-500 text-white rounded-md hover:bg-gray-600 text-sm">
                Cancel
            </button>
        </div>
    </div>
    <div id="{{ section_name }}-notes-container" class="space-y-2">
        <!-- Notes will be added here -->
    </div>
</div>
